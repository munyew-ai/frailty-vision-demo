<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chair Stand Rep Counter — Frailty Coach</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <!-- MediaPipe Tasks Vision via jsDelivr CDN -->
  <script type="importmap">
  {
    "imports": {
      "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
    }
  }
  </script>

  <style>
    /* ── Frailty Coach Design Tokens ── */
    :root {
      --bg:          #fbf6ea;
      --panel:       #ffffff;
      --ink:         #143230;
      --muted:       #66746f;
      --line:        #e4ddd0;
      --teal:        #006252;
      --teal-2:      #11806f;
      --blue:        #23608d;
      --coral:       #dc6b5b;
      --amber:       #f3c64f;
      --green:       #33845f;
      --cream:       #fffaf0;
      --sage:        #eaf3ea;
      --sky:         #eef7fb;
      --shadow:      0 18px 42px rgba(53, 45, 28, 0.12);

      /* Derived */
      --btn-primary-bg:   var(--teal);
      --btn-primary-fg:   #ffffff;
      --btn-secondary-bg: var(--sage);
      --btn-secondary-fg: var(--teal);
      --btn-radius:       999px;
      --card-radius:      16px;
      --btn-height:       56px;
      --font:             Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 18px;
      line-height: 1.5;
      min-height: 100dvh;
    }

    /* ── Layout shell ── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 1rem 1rem 2rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Privacy banner ── */
    #privacy-banner {
      width: 100%;
      background: var(--sage);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      font-size: 0.875rem;
      color: var(--teal);
      text-align: center;
      font-weight: 600;
    }

    /* ── Status / error message ── */
    #status-msg {
      width: 100%;
      background: var(--sky);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      color: var(--ink);
      text-align: center;
      display: none;
    }
    #status-msg.visible { display: block; }
    #status-msg.error   { background: #fff0ed; border-color: var(--coral); color: #7a1a0e; }

    /* ── Video / canvas area ── */
    #video-area {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    #webcam-video,
    #sample-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    #webcam-video.active,
    #sample-video.active { display: block; }

    #pose-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: rgba(20, 50, 48, 0.82);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }
    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Rep counter ── */
    #counter-panel {
      width: 100%;
      background: var(--panel);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      padding: 1.5rem 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #counter-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Elder-friendly: ≥ 72px */
    #rep-count {
      font-size: 72px;
      font-weight: 900;
      color: var(--teal);
      line-height: 1;
      min-width: 3ch;
      text-align: center;
      transition: transform 0.15s ease;
    }
    #rep-count.pop {
      transform: scale(1.18);
      color: var(--green);
    }

    /* ── Feedback line ── */
    #feedback {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      min-height: 2rem;
      transition: color 0.2s;
    }
    #feedback.good   { color: var(--green); }
    #feedback.prompt { color: var(--blue); }
    #feedback.lower  { color: var(--coral); }

    /* ── State indicator ── */
    #state-indicator {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      cursor: pointer;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--btn-radius);
      min-height: var(--btn-height);
      padding: 0 1.75rem;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      white-space: nowrap;
    }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--btn-primary-bg);
      color: var(--btn-primary-fg);
      box-shadow: 0 4px 14px rgba(0, 98, 82, 0.28);
    }
    .btn-primary:hover { background: var(--teal-2); }

    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-fg);
      border: 2px solid var(--teal);
    }
    .btn-secondary:hover { background: #d0ead3; }

    .btn-danger {
      background: #fff0ed;
      color: var(--coral);
      border: 2px solid var(--coral);
    }
    .btn-danger:hover { background: #fdddd8; }

    /* ── Reset button ── */
    #reset-btn {
      font-size: 0.875rem;
      min-height: 44px;
      padding: 0 1.25rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    #reset-btn:hover { background: var(--line); }

    /* ── Hip Y debug bar (optional visual) ── */
    #hip-bar-wrap {
      width: 100%;
      background: var(--line);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
      display: none;
    }
    #hip-bar-wrap.visible { display: block; }
    #hip-bar {
      height: 100%;
      background: var(--teal);
      border-radius: 999px;
      transition: width 0.1s;
    }

    /* ── Footer note ── */
    #footer-note {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Privacy banner -->
  <div id="privacy-banner">
    🔒 All processing on-device — no video leaves your phone
  </div>

  <!-- Status / error messages -->
  <div id="status-msg" role="alert"></div>

  <!-- Video / canvas area -->
  <div id="video-area">
    <!-- Live webcam source -->
    <video id="webcam-video" autoplay playsinline muted></video>

    <!-- Sample video fallback (royalty-free Pexels MP4) -->
    <video
      id="sample-video"
      loop
      muted
      playsinline
      crossorigin="anonymous"
      src="https://www.w3schools.com/html/mov_bbb.mp4"
    ></video>

    <!-- Pose skeleton overlay -->
    <canvas id="pose-canvas"></canvas>

    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span id="loading-text">Loading AI model…</span>
    </div>
  </div>

  <!-- Rep counter -->
  <div id="counter-panel">
    <div id="counter-label">Chair Stands</div>
    <div id="rep-count" aria-live="polite" aria-label="Rep count">0</div>
    <div id="feedback" role="status">Waiting for pose…</div>
    <div id="state-indicator">State: idle</div>
  </div>

  <!-- Hip Y progress bar (debug aid) -->
  <div id="hip-bar-wrap" title="Hip Y position (normalized)">
    <div id="hip-bar" style="width:50%"></div>
  </div>

  <!-- Mode buttons -->
  <div class="btn-row">
    <button id="webcam-btn" class="btn-primary">📷 Use Webcam</button>
    <button id="sample-btn" class="btn-secondary">🎬 Sample Video</button>
  </div>

  <div class="btn-row">
    <button id="reset-btn">Reset Count</button>
  </div>

  <div id="footer-note">
    Stand and sit from a chair at a comfortable pace. Each full sit→stand→sit is one rep.
  </div>

</div><!-- /#app -->

<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils } from "@mediapipe/tasks-vision";

/* ─────────────────────────────────────────────────────────
   CONSTANTS & DOM REFS
───────────────────────────────────────────────────────── */
const LEFT_HIP  = 23;
const RIGHT_HIP = 24;

// State machine states
const STATES = Object.freeze({
  IDLE:     "idle",
  SITTING:  "sitting",
  RISING:   "rising",
  STANDING: "standing",
  LOWERING: "lowering",
});

// Thresholds (normalized Y — 0 = top of frame, 1 = bottom)
const SIT_THRESHOLD  = 0.55;  // hip Y > 0.55 → sitting
const STAND_THRESHOLD = 0.42; // hip Y < 0.42 → standing

// Debounce: require threshold to be held for N consecutive frames
const DEBOUNCE_FRAMES = 5;

const $webcamVideo  = document.getElementById("webcam-video");
const $sampleVideo  = document.getElementById("sample-video");
const $canvas       = document.getElementById("pose-canvas");
const $loadingOvl   = document.getElementById("loading-overlay");
const $loadingText  = document.getElementById("loading-text");
const $repCount     = document.getElementById("rep-count");
const $feedback     = document.getElementById("feedback");
const $stateInd     = document.getElementById("state-indicator");
const $hipBarWrap   = document.getElementById("hip-bar-wrap");
const $hipBar       = document.getElementById("hip-bar");
const $statusMsg    = document.getElementById("status-msg");
const $webcamBtn    = document.getElementById("webcam-btn");
const $sampleBtn    = document.getElementById("sample-btn");
const $resetBtn     = document.getElementById("reset-btn");

const ctx           = $canvas.getContext("2d");

/* ─────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────── */
let repCount       = 0;
let machineState   = STATES.IDLE;
let debounceCount  = 0;      // consecutive frames in pending transition
let pendingState   = null;   // candidate next state awaiting debounce
let lastVideoTime  = -1;
let poseLandmarker = null;
let animFrameId    = null;
let goodRepTimer   = null;
let activeMode     = null;   // "webcam" | "sample"

/* ─────────────────────────────────────────────────────────
   MEDIAPIPE INIT
───────────────────────────────────────────────────────── */
async function initMediaPipe() {
  showLoading("Loading AI model (first load may take ~10 s)…");
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO",
      numPoses: 1,
    });
    hideLoading();
    showStatus("Model ready. Choose a mode below.", false);
    $webcamBtn.disabled = false;
    $sampleBtn.disabled = false;
  } catch (err) {
    hideLoading();
    showStatus("Failed to load AI model: " + err.message, true);
    console.error(err);
  }
}

/* ─────────────────────────────────────────────────────────
   VIDEO MODES
───────────────────────────────────────────────────────── */
async function startWebcam() {
  stopCurrentMode();
  activeMode = "webcam";
  showLoading("Requesting camera…");
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false,
    });
    $webcamVideo.srcObject = stream;
    await $webcamVideo.play();
    $webcamVideo.classList.add("active");
    $sampleVideo.classList.remove("active");
    hideLoading();
    clearStatus();
    resetStateAndCount();
    startDetectionLoop($webcamVideo);
  } catch (err) {
    hideLoading();
    const msg = err.name === "NotAllowedError"
      ? "Camera permission denied. Switching to sample video mode."
      : "Camera unavailable: " + err.message + ". Switching to sample video mode.";
    showStatus(msg, true);
    // Auto-switch to sample video
    setTimeout(() => startSampleVideo(), 1800);
  }
}

function startSampleVideo() {
  stopCurrentMode();
  activeMode = "sample";
  $sampleVideo.classList.add("active");
  $webcamVideo.classList.remove("active");
  clearStatus();
  resetStateAndCount();
  $sampleVideo.play().catch(() => {});
  startDetectionLoop($sampleVideo);
  showStatus("Running on sample video — position a chair-stand in frame for best results.", false);
}

function stopCurrentMode() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if ($webcamVideo.srcObject) {
    $webcamVideo.srcObject.getTracks().forEach(t => t.stop());
    $webcamVideo.srcObject = null;
  }
  $sampleVideo.pause();
}

/* ─────────────────────────────────────────────────────────
   DETECTION LOOP
───────────────────────────────────────────────────────── */
function startDetectionLoop(videoEl) {
  function loop() {
    animFrameId = requestAnimationFrame(loop);
    if (!poseLandmarker) return;

    // Sync canvas size to video display size
    const { videoWidth: vw, videoHeight: vh } = videoEl;
    if (vw === 0 || vh === 0) return;

    const rect = $canvas.getBoundingClientRect();
    if ($canvas.width !== rect.width || $canvas.height !== rect.height) {
      $canvas.width  = rect.width;
      $canvas.height = rect.height;
    }

    const nowMs = performance.now();
    if (videoEl.currentTime === lastVideoTime) return;
    lastVideoTime = videoEl.currentTime;

    let results;
    try {
      results = poseLandmarker.detectForVideo(videoEl, nowMs);
    } catch (_) { return; }

    // Draw
    ctx.clearRect(0, 0, $canvas.width, $canvas.height);
    if (results.landmarks && results.landmarks.length > 0) {
      const drawUtils = new DrawingUtils(ctx);
      for (const lms of results.landmarks) {
        drawUtils.drawConnectors(lms, PoseLandmarker.POSE_CONNECTIONS, {
          color: "rgba(0, 98, 82, 0.7)",
          lineWidth: 2,
        });
        drawUtils.drawLandmarks(lms, {
          color: "#f3c64f",
          fillColor: "#11806f",
          lineWidth: 1,
          radius: 3,
        });
      }
      processLandmarks(results.landmarks[0]);
    } else {
      setFeedback("No pose detected — ensure full body is visible", "prompt");
      $stateInd.textContent = "State: " + machineState + " (no pose)";
    }
  }
  animFrameId = requestAnimationFrame(loop);
}

/* ─────────────────────────────────────────────────────────
   REP DETECTION STATE MACHINE
───────────────────────────────────────────────────────── */
function processLandmarks(landmarks) {
  // Average normalized Y for LEFT_HIP and RIGHT_HIP
  const leftHip  = landmarks[LEFT_HIP];
  const rightHip = landmarks[RIGHT_HIP];
  if (!leftHip || !rightHip) return;

  const hipY = (leftHip.y + rightHip.y) / 2;

  // Update debug bar (0 = top, 1 = bottom → flip for display)
  $hipBar.style.width = (hipY * 100).toFixed(1) + "%";

  // Determine raw target state from hipY
  let rawTarget = null;
  if (hipY > SIT_THRESHOLD)   rawTarget = "low";   // sitting
  if (hipY < STAND_THRESHOLD) rawTarget = "high";  // standing

  // Debounce: candidate must hold for DEBOUNCE_FRAMES consecutive frames
  applyDebounce(rawTarget, hipY);

  $stateInd.textContent = `State: ${machineState} | hipY: ${hipY.toFixed(3)}`;
}

function applyDebounce(rawTarget, hipY) {
  // Determine what transition the current state machine wants next
  const candidate = candidateNext(rawTarget);

  if (candidate === machineState || candidate === null) {
    // No transition needed — reset debounce counter
    debounceCount = 0;
    pendingState  = null;
    updateFeedback(hipY);
    return;
  }

  if (candidate !== pendingState) {
    // New candidate — start counting
    pendingState  = candidate;
    debounceCount = 1;
  } else {
    debounceCount++;
  }

  if (debounceCount >= DEBOUNCE_FRAMES) {
    // Threshold held long enough — commit the transition
    transitionTo(candidate);
    debounceCount = 0;
    pendingState  = null;
  }

  updateFeedback(hipY);
}

function candidateNext(rawTarget) {
  switch (machineState) {
    case STATES.IDLE:
      if (rawTarget === "low")  return STATES.SITTING;
      return null;
    case STATES.SITTING:
      if (rawTarget === null)   return STATES.RISING;   // hips moving up but not at stand threshold yet
      if (rawTarget === "high") return STATES.STANDING;
      return null;
    case STATES.RISING:
      if (rawTarget === "high") return STATES.STANDING;
      if (rawTarget === "low")  return STATES.SITTING;  // sat back down without fully standing
      return null;
    case STATES.STANDING:
      if (rawTarget === null)   return STATES.LOWERING;
      if (rawTarget === "low")  return STATES.SITTING;
      return null;
    case STATES.LOWERING:
      if (rawTarget === "low")  return STATES.SITTING;  // completed the rep
      if (rawTarget === "high") return STATES.STANDING; // went back up
      return null;
    default:
      return null;
  }
}

function transitionTo(newState) {
  const prev = machineState;
  machineState = newState;

  // A rep is completed when we return to sitting after having been standing
  if ((prev === STATES.LOWERING || prev === STATES.STANDING) && newState === STATES.SITTING) {
    repCount++;
    $repCount.textContent = repCount;
    triggerRepAnimation();
    setFeedback("Good rep!", "good");
    clearTimeout(goodRepTimer);
    goodRepTimer = setTimeout(() => setFeedback("Keep going!", "prompt"), 2000);
  } else if (newState === STATES.IDLE) {
    setFeedback("Waiting for pose…", "");
  } else if (newState === STATES.SITTING) {
    setFeedback("Ready — stand when you're set", "prompt");
  }
}

function updateFeedback(hipY) {
  if (goodRepTimer && machineState === STATES.SITTING) return; // show "Good rep!" briefly

  switch (machineState) {
    case STATES.IDLE:
      setFeedback("Step into frame and sit down to begin", "prompt");
      break;
    case STATES.SITTING:
      setFeedback("Ready — stand when you're set", "prompt");
      break;
    case STATES.RISING:
      setFeedback("Stand up fully", "prompt");
      break;
    case STATES.STANDING:
      setFeedback("Now sit back down", "lower");
      break;
    case STATES.LOWERING:
      setFeedback("Lower slowly", "lower");
      break;
  }
}

/* ─────────────────────────────────────────────────────────
   UI HELPERS
───────────────────────────────────────────────────────── */
function setFeedback(text, cls) {
  $feedback.textContent = text;
  $feedback.className = cls || "";
}

function triggerRepAnimation() {
  $repCount.classList.add("pop");
  setTimeout(() => $repCount.classList.remove("pop"), 300);
}

function showLoading(text) {
  $loadingText.textContent = text;
  $loadingOvl.classList.remove("hidden");
}

function hideLoading() {
  $loadingOvl.classList.add("hidden");
}

function showStatus(msg, isError) {
  $statusMsg.textContent = msg;
  $statusMsg.className = isError ? "visible error" : "visible";
}

function clearStatus() {
  $statusMsg.className = "";
  $statusMsg.textContent = "";
}

function resetStateAndCount() {
  repCount     = 0;
  machineState = STATES.IDLE;
  debounceCount = 0;
  pendingState  = null;
  clearTimeout(goodRepTimer);
  $repCount.textContent = "0";
  setFeedback("Waiting for pose…", "");
  $stateInd.textContent = "State: idle";
}

/* ─────────────────────────────────────────────────────────
   EVENT LISTENERS
───────────────────────────────────────────────────────── */
$webcamBtn.addEventListener("click", () => {
  if (!poseLandmarker) { showStatus("Model still loading — please wait.", false); return; }
  startWebcam();
});

$sampleBtn.addEventListener("click", () => {
  if (!poseLandmarker) { showStatus("Model still loading — please wait.", false); return; }
  startSampleVideo();
});

$resetBtn.addEventListener("click", resetStateAndCount);

/* Disable buttons until model is ready */
$webcamBtn.disabled = true;
$sampleBtn.disabled = true;

/* Boot */
initMediaPipe();
</script>
</body>
</html>
